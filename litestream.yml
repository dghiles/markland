# Continuously replicates /data/markland.db to Cloudflare R2.
# Credentials come from env: LITESTREAM_ACCESS_KEY_ID, LITESTREAM_SECRET_ACCESS_KEY.
# Bucket + endpoint come from: LITESTREAM_BUCKET, LITESTREAM_ENDPOINT.
# region: auto is the R2 convention; needed because bucket-scoped R2 tokens
# can't satisfy Litestream's region-discovery HeadBucket call.

dbs:
  - path: /data/markland.db
    replicas:
      - type: s3
        bucket: ${LITESTREAM_BUCKET}
        path: markland
        endpoint: ${LITESTREAM_ENDPOINT}
        region: auto
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        sync-interval: 10s
        retention: 72h
        snapshot-interval: 6h
