app = "markland"
primary_region = "iad"

[build]

[env]
  MARKLAND_BASE_URL = "https://markland.dev"
  MARKLAND_DATA_DIR = "/data"
  MARKLAND_WEB_PORT = "8080"
  RESEND_FROM_EMAIL = "notifications@markland.dev"

[[mounts]]
  source = "markland_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
