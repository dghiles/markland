# fly.toml app configuration file generated for markland on 2026-04-20T15:39:46-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'markland'
primary_region = 'iad'

[build]

[env]
  MARKLAND_BASE_URL = 'https://markland.dev'
  MARKLAND_DATA_DIR = '/data'
  MARKLAND_WEB_PORT = '8080'
  RESEND_FROM_EMAIL = 'notifications@markland.dev'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
