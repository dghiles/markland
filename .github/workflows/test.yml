name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.6"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install deps
        run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest tests/ -v
