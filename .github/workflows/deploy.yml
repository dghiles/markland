name: Deploy to Fly

# Auto-deploys main to Fly via `flyctl deploy --remote-only --strategy immediate`.
# Verified 2026-04-30 to update the existing machine 185191df264378 in place
# without creating an orphan sibling. The default rolling strategy hit a
# launch-group lookup bug ("Your app doesn't have any Fly Launch machines, so
# we'll create one now") that produced an orphan on every run; --strategy
# immediate uses a different code path inside flyctl that correctly finds the
# existing machine. See docs/plans/2026-04-29-fix-fly-deploy-launch-group.md
# for the full diagnostic.
#
# If a future deploy creates an orphan machine again (visible in
# `flyctl machine list -a markland`), disable the push: trigger below and
# reopen that plan.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-main
    needs: [] # Intentionally independent; tests run in parallel.
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@v1
      - name: Deploy
        run: flyctl deploy --remote-only --strategy immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
